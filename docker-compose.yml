services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run apps/dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    env_file:
      - .env.example
    ports:
      - "8501:8501"
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A apps.worker.main.celery_app worker --loglevel=INFO
    env_file:
      - .env.example
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: echomind
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pg_data:
